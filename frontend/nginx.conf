# Static SPA serving (Phase 10 prod frontend image). Path routing for /api and
# /stream to the backend is done by the Kubernetes Ingress, NOT here — this
# server only serves the built SPA with a history-API fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Never cache the runtime config or the HTML entry — they must reflect the
    # current deployment / latest bundle immediately.
    location = /env.js       { add_header Cache-Control "no-store"; }
    location = /index.html   { add_header Cache-Control "no-store"; }

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Local dev stack: backend + Postgres + frontend.
#
# Usage:
#   docker compose up           # foreground; backend logs visible
#   docker compose up -d        # background
#   docker compose down         # stop
#   docker compose down -v      # stop AND wipe db volume (full reset)
#   docker compose logs -f backend
#
# Ports exposed to host:
#   5432 — Postgres (for local psql convenience)
#   8081 — Backend (REST + WebSocket). Host port 8080 is taken on this shared
#          machine by Apache Airflow; we map host:8081 → container:8080.
#   5174 — Frontend Vite dev server. Host port 5173 is taken by another
#          process on this shared machine; we map host:5174 → container:5173.
#
# The browser hits localhost:8081 (backend) and localhost:5174 (frontend)
# directly, not via the docker network. VITE_BACKEND_URL reflects this.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/orbit
      DB_USER: orbit
      DB_PASSWORD: orbit
      SERVER_PORT: "8080"
      APP_VERSION: "0.1.0-dev"
      APP_BUILD_TIME: "dev"
      # Permit CORS from the Vite dev server during local dev. Tightened in
      # production via the same env var.
      CORS_ALLOWED_ORIGINS: "http://localhost:5174"
    ports:
      # host:8081 → container:8080 (8080 is taken on the host by Airflow)
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      # The browser is on the *host*, so it reaches the backend via the
      # host-published port, not the docker network.
      VITE_BACKEND_URL: "http://localhost:8081"
    volumes:
      # Bind-mount source for hot reload.
      - ./frontend:/app
      # Keep the container's node_modules (Linux/musl binaries) — without this
      # the host's node_modules (potentially different platform) overlays it.
      - /app/node_modules
    ports:
      # host:5174 → container:5173 (5173 is taken on the host)
      - "5174:5173"

volumes:
  db_data:

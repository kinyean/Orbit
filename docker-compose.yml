# Local dev stack: backend + Postgres + frontend.
#
# Usage:
#   docker compose up           # foreground; backend logs visible
#   docker compose up -d        # background
#   docker compose down         # stop
#   docker compose down -v      # stop AND wipe db volume (full reset)
#   docker compose logs -f backend
#
# Ports (all bound to 127.0.0.1 = reachable only from THIS box, not the network,
# because the machine is shared):
#   5432 — Postgres (local psql convenience)
#   8081 — Backend (REST + WebSocket). Host 8080 is taken by Apache Airflow;
#          mapped host:8081 → container:8080.
#   5174 — Frontend Vite dev server. Host 5173 is taken; mapped 5174 → 5173.
#
# These are box-local only. For network access, run the OIDC + HTTPS overlay
# (docker-compose.oidc.yml), which adds nginx on :8443 as the single network-facing
# entry (it reaches the frontend/backend over the docker network, not these ports).
# For plain stub-mode dev from another machine, use an SSH tunnel to these ports.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: orbit
      # From .env (gitignored). See .env.example. Never a literal here.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: orbit
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Bound to loopback: Postgres is reachable only from the box (local psql),
      # never from the network. The backend reaches it via the docker network (db:5432).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/orbit
      DB_USER: orbit
      # From .env (gitignored). See .env.example. Never a literal here.
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      SERVER_PORT: "8080"
      APP_VERSION: "0.1.0-dev"
      APP_BUILD_TIME: "dev"
      # Permit CORS from the Vite dev server during local dev. Tightened in
      # production via the same env var.
      # CORS origin PATTERNS. Browsers send Origin on WebSocket handshakes even
      # through the proxy, and that origin is the frontend's host:port (the
      # server's IP in remote dev), which varies — so allow-all in dev. The
      # catalog WS handshake 403s if this is too narrow. Lock down in Phase 10.
      CORS_ALLOWED_ORIGINS: "*"
      # Measured-data import (WOD CSV → scenario): the reader may only open files
      # under this root. Mounted read-only below.
      IMPORT_ALLOWED_ROOT: "/shared_folder"
    volumes:
      # Shared data drop for measured-telemetry imports (read-only).
      - /mnt/disk_large/shared_folder:/shared_folder:ro
    ports:
      # host:8081 → container:8080 (8080 is taken on the host by Airflow).
      # Bound to loopback: direct backend access is box-only (Swagger UI, curl,
      # IDE OpenAPI client gen). nginx (:8443) reaches the backend via the docker
      # network, and the frontend proxies /api → backend the same way — neither
      # uses this published port, so binding it to localhost changes nothing there.
      - "127.0.0.1:8081:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      # The Vite dev server proxies /api/* to this URL. Backend reached by
      # docker service name on the docker network — the browser never sees
      # this, it only ever talks to localhost:5174 (same-origin).
      PROXY_TARGET: "http://backend:8080"
    volumes:
      # Bind-mount source for hot reload.
      - ./frontend:/app
      # Keep the container's node_modules (Linux/musl binaries) — without this
      # the host's node_modules (potentially different platform) overlays it.
      - /app/node_modules
    ports:
      # host:5174 → container:5173 (5173 is taken on the host).
      # Bound to loopback: this plain-HTTP entry is box-only. The network-facing
      # entry is nginx on :8443 (docker-compose.oidc.yml), which reaches the
      # frontend via the docker network. For plain stub-mode dev over the network,
      # use an SSH tunnel to 5174 or run the oidc overlay.
      - "127.0.0.1:5174:5173"

volumes:
  db_data:

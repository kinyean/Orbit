# nginx TLS terminator for the internal-network OIDC dev stack (Phase 10).
#
# Serves EVERYTHING under one origin https://174.75.16.25:8443/ with a self-signed cert
# (this box has no public domain, so no public CA can issue a trusted one — testers
# click through a one-time browser warning). nginx serves the cert as the listen
# socket's default_server, so it works for a bare IP where SNI is never sent
# (Caddy couldn't — it selects certs by SNI). Production replaces this with a real
# ingress + cert-manager (trusted cert, no warning) at a public domain.

# WebSocket upgrade passthrough for the /api/stream/* sockets.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/site.crt;
    ssl_certificate_key /etc/nginx/certs/site.key;

    # Keycloak (login server) owns these path prefixes. It derives its issuer
    # (https://174.75.16.25:8443/realms/orbit) from the X-Forwarded-* headers below,
    # so the token's `iss` matches what the SPA + backend expect. X-Forwarded-Port
    # is the PUBLISHED host port (8443), which is what belongs in the issuer URL —
    # not nginx's internal listen port (443).
    location ~ ^/(realms|resources|admin|js)(/|$) {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  8443;
    }

    # Everything else → the Vite dev server, which already same-origin-proxies
    # /api/* (including the /api/stream/* WebSockets) to the backend.
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;   # long-lived scenario/catalog stream sockets
    }
}

{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orbit.fullname" . }}-postgres
  labels:
    {{- include "orbit.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "orbit.selectorLabels" (dict "root" $ "component" "postgres") | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "orbit.fullname" . }}-postgres
  labels:
    {{- include "orbit.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "orbit.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "orbit.selectorLabels" (dict "root" $ "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orbit.selectorLabels" (dict "root" $ "component" "postgres") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "orbit.secretName" . }}
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.db | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClassName }}
        storageClassName: {{ .Values.postgres.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage | quote }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "orbit.fullname" . }}-backend
  labels:
    {{- include "orbit.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "orbit.selectorLabels" (dict "root" $ "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orbit.fullname" . }}-backend
  labels:
    {{- include "orbit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "orbit.selectorLabels" (dict "root" $ "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orbit.selectorLabels" (dict "root" $ "component" "backend") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}/{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: SERVER_PORT
              value: {{ .Values.backend.port | quote }}
            - name: DB_URL
              value: {{ include "orbit.dbUrl" . | quote }}
            - name: DB_USER
              value: {{ include "orbit.dbUser" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "orbit.secretName" . }}
                  key: db-password
            - name: ORBIT_AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            {{- if eq .Values.auth.mode "oidc" }}
            - name: OIDC_ISSUER_URI
              value: {{ .Values.auth.issuerUrl | quote }}
            {{- end }}
            # Same-origin in prod (SPA + /api under one ingress host) → lock CORS/WS.
            - name: CORS_ALLOWED_ORIGINS
              value: {{ printf "https://%s" .Values.ingress.host | quote }}
            - name: ORBIT_STREAM_ALLOWED_ORIGINS
              value: {{ printf "https://%s" .Values.ingress.host | quote }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

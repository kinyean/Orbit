spring:
  application:
    name: orbit-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orbit}
    username: ${DB_USER:orbit}
    password: ${DB_PASSWORD:orbit}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; JPA only validates.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

orbit:
  orekit:
    # Path to the unpacked Orekit data bundle. Container bakes it at /opt/orekit-data;
    # the Gradle test task overrides this via the orekit.data.path system property.
    data-path: ${OREKIT_DATA_PATH:/opt/orekit-data}
  catalog:
    # Bundled offline TLE/GP seed (baked into the image at build time). Loaded at
    # startup so the catalog works with zero network. Best-effort if absent.
    seed-file: ${CATALOG_SEED_FILE:/opt/orbit/tle-seed.json}
    # Refresh sources, tried in order. CelesTrak is firewall-blocked from this
    # host (expected to fail, caught); the GitHub mirror is reachable.
    sources: ${CATALOG_SOURCES:https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json,https://raw.githubusercontent.com/jaimeautomatiza/tle-proxy/main/data/tle.json}
    refresh-cron: ${CATALOG_REFRESH_CRON:0 0 */6 * * *}
    propagation-interval-ms: ${CATALOG_PROPAGATION_INTERVAL_MS:30000}
    window-seconds: ${CATALOG_WINDOW_SECONDS:180}
    step-seconds: ${CATALOG_STEP_SECONDS:60}
    fetch-timeout-ms: ${CATALOG_FETCH_TIMEOUT_MS:20000}
    # 0 = no cap; set a smaller number to throttle for perf experiments.
    max-satellites: ${CATALOG_MAX_SATELLITES:0}
  scenario:
    # Per-scenario stream (Phase 4). On connect the backend precomputes the
    # whole [start,end] ephemeris once and pushes it (gzipped); playback is then
    # pure client-side clock math. step-seconds is the requested sample spacing;
    # the service raises the EFFECTIVE step to keep samples-per-sat under the cap
    # and echoes that effective step in the envelope (never silently truncates).
    step-seconds: ${SCENARIO_STEP_SECONDS:30}
    max-samples-per-sat: ${SCENARIO_MAX_SAMPLES_PER_SAT:5000}
    include-relative-velocity: ${SCENARIO_INCLUDE_RELATIVE_VELOCITY:true}
    include-paths: ${SCENARIO_INCLUDE_PATHS:true}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Build info exposed via the /health endpoint (read by HealthController).
info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:0.0.1-SNAPSHOT}
    buildTime: ${APP_BUILD_TIME:dev}

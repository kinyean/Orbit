spring:
  application:
    name: orbit-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orbit}
    username: ${DB_USER:orbit}
    password: ${DB_PASSWORD:orbit}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; JPA only validates.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

orbit:
  orekit:
    # Path to the unpacked Orekit data bundle. Container bakes it at /opt/orekit-data;
    # the Gradle test task overrides this via the orekit.data.path system property.
    data-path: ${OREKIT_DATA_PATH:/opt/orekit-data}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Build info exposed via the /health endpoint (read by HealthController).
info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:0.0.1-SNAPSHOT}
    buildTime: ${APP_BUILD_TIME:dev}
